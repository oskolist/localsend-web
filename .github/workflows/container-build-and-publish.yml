name: Build and Publish Container Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    #if: github.ref_name == github.event.repository.default_branch
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Variables
        uses: actions/github-script@v7
        id: lowercase
        with:
          script: |
            // convert everything to lowercase because ghcr repository name must be lowercase
            const actor = context.actor.toLowerCase();
            const repository = context.repo.repo.toLowerCase();
            core.setOutput('actor', actor);
            core.setOutput('repository', repository);

      - name: Create Dockerfile
        run: |
          cat <<'DOCKERFILE_EOF' > Dockerfile
          FROM node:22-alpine AS builder
          WORKDIR /app
          # Install pnpm
          RUN corepack enable && corepack prepare pnpm@latest --activate
          COPY package.json pnpm-lock.yaml ./
          RUN pnpm install

          COPY . .
          ENV NODE_ENV=production
          RUN pnpm run generate

          FROM nginx:latest AS runner
          RUN cat > /etc/nginx/conf.d/default.conf << 'EOF'
          server {
              listen 8000;
              server_name _;
              root /usr/share/nginx/html;
              index index.html;
              location / {
                  try_files \$uri \$uri/ /index.html;
              }
          }
          EOF
          COPY --from=builder /app/build /usr/share/nginx/html
          EXPOSE 8000
          CMD ["nginx", "-g", "daemon off;"]
          DOCKERFILE_EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.actor }}/localsend-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
